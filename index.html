<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GrowUp Hackathon</title>
    <link rel="icon" type="image/png" href="logo.png" /> 
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            start: '#9d4edd', 
                            end: '#a3e635',   
                            dark: '#040b1d',  
                            card: '#091428',  
                            border: '#6d28d9' 
                        }
                    },
                    fontFamily: {
                        'adumu': ['Adumu', 'Poppins', 'sans-serif'], 
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* --- FONTS & BASICS --- */
        @font-face {
            font-family: 'Adumu';
            src: url('Adumu-Regular.otf') format('opentype'),
                 url('Adumu-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background:
                radial-gradient(circle at 0% 100%, rgba(141, 37, 255, 0.22), transparent 28%),
                radial-gradient(circle at 100% 88%, rgba(108, 255, 57, 0.22), transparent 26%),
                radial-gradient(circle at 14% 15%, rgba(157, 78, 221, 0.18), transparent 24%),
                linear-gradient(135deg, #020617 0%, #040b1d 35%, #031124 70%, #04131f 100%);
            color: #f3f4f6;
            scroll-behavior: smooth;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }

        body::before {
            background:
                linear-gradient(130deg, transparent 0 12%, rgba(157, 78, 221, 0.14) 12%, rgba(157, 78, 221, 0.06) 18%, transparent 18% 100%),
                linear-gradient(130deg, transparent 0 78%, rgba(132, 204, 22, 0.18) 78%, rgba(132, 204, 22, 0.07) 84%, transparent 84% 100%);
            opacity: 0.95;
        }

        body::after {
            background:
                radial-gradient(circle at 92% 18%, transparent 0 120px, rgba(34, 197, 94, 0.22) 121px 123px, transparent 124px),
                radial-gradient(circle at 4% 78%, transparent 0 92px, rgba(168, 85, 247, 0.20) 93px 95px, transparent 96px),
                radial-gradient(circle at 88% 78%, transparent 0 110px, rgba(132, 204, 22, 0.18) 111px 113px, transparent 114px);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #081120; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #8b5cf6, #84cc16); border-radius: 5px; }

        /* Effects */
        .hero-gradient {
            background: 
                radial-gradient(circle at 18% 24%, rgba(157, 78, 221, 0.18), transparent 38%),
                radial-gradient(circle at 82% 72%, rgba(132, 204, 22, 0.18), transparent 34%),
                linear-gradient(135deg, rgba(1, 6, 18, 0.92), rgba(5, 16, 36, 0.72));
        }

        .text-gradient {
            background: linear-gradient(90deg, #b779ff 0%, #9d4edd 32%, #84cc16 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-lime {
            background: linear-gradient(90deg, #d8ff72 0%, #a3e635 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #8b5cf6 0%, #84cc16 100%);
            box-shadow: 0 14px 45px rgba(132, 204, 22, 0.2);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            filter: brightness(1.06);
            box-shadow: 0 16px 50px rgba(132, 204, 22, 0.26);
            transform: translateY(-2px);
        }

        .hero-beam-left,
        .hero-beam-right {
            position: absolute;
            inset: auto;
            width: 44vw;
            height: 120vh;
            pointer-events: none;
            opacity: 0.7;
            filter: saturate(120%);
        }

        .hero-beam-left {
            left: -14vw;
            top: 10vh;
            background: linear-gradient(140deg, rgba(168, 85, 247, 0.28), rgba(168, 85, 247, 0.04) 35%, transparent 35%);
            transform: rotate(-8deg);
            clip-path: polygon(0 0, 26% 0, 74% 100%, 48% 100%);
        }

        .hero-beam-right {
            right: -10vw;
            top: -6vh;
            background: linear-gradient(140deg, rgba(132, 204, 22, 0.32), rgba(132, 204, 22, 0.04) 40%, transparent 40%);
            transform: rotate(6deg);
            clip-path: polygon(18% 0, 100% 0, 56% 100%, 30% 100%);
        }

        .hero-panel {
            background: linear-gradient(180deg, rgba(7, 16, 36, 0.82), rgba(7, 16, 36, 0.42));
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
        }

        .section-title {
            letter-spacing: -0.03em;
        }

        .section-glow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            height: 60%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(132, 204, 22, 0.09), transparent 70%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        .section-shell {
            background: linear-gradient(180deg, rgba(8, 20, 40, 0.86), rgba(5, 14, 30, 0.76));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(10px);
        }

        /* Timeline Line */
        .timeline-line {
            position: absolute;
            left: 50%;
            top: 20px;
            bottom: 20px;
            width: 2px;
            background: linear-gradient(to bottom, #9d4edd, #84cc16, #9d4edd);
            transform: translateX(-50%);
        }
        @media (max-width: 768px) {
            .timeline-line { left: 24px; transform: translateX(0); }
        }

        /* Puzzle/Block Style */
        .puzzle-block {
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(145deg, rgba(8,20,40,0.9), rgba(5,12,25,0.92));
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        .puzzle-block:hover {
            border-color: rgba(132, 204, 22, 0.55);
            transform: translateY(-5px);
            box-shadow: 0 18px 44px -8px rgba(132, 204, 22, 0.18);
        }

        .poster-outline {
            position: relative;
        }

        .poster-outline::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 30px;
            pointer-events: none;
        }

        .accent-dot {
            width: 0.6rem;
            height: 0.6rem;
            border-radius: 999px;
            background: linear-gradient(180deg, #c084fc, #a3e635);
            box-shadow: 0 0 16px rgba(163, 230, 53, 0.45);
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

    // --- LINKI GLOBALNE ---
    const GOOGLE_FORM_LINK = "zophia.hardek@gmail.com TUTAJ WKLEJ LINK"; 
    const REGULAMIN_LINK = "asia.lilolu@gmail.com TUTAJ WKLEJ LINK";
    const FB_LINK = "https://www.facebook.com/profile.php?id=61585845027175";
    const INSTA_LINK = "https://www.instagram.com/growup_hackaton/";
    const FAQ_LINK = "https://docs.google.com/document/d/1-OJcjPge2NulJpsTYYFHil2jebnhQXclkIkyVJnpSTs/edit?tab=t.0";
    const PRIVACY_LINK = "https://docs.google.com/document/d/1ugv88sR4mOQfGResNn98M_nadKTj-VNJ5fZ7Tk1pgZ8/edit?usp=sharing";

    // --- 1. HEADER ---
const Header = () => {
    const [isScrolled, setIsScrolled] = React.useState(false);

    React.useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
    }, []);

        return (
            <header className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'bg-[#0a0510]/95 backdrop-blur-md border-b border-white/10 py-2' : 'bg-[#040b1d]/55 backdrop-blur-sm py-3'}`}>
                <nav className="container mx-auto px-6 flex justify-between items-center">

                    {/* Logo */}
                    <a href="#" className="flex items-center gap-3 hover:opacity-90">
                        <img src="logo.png" alt="GrowUp Logo" className="h-12 md:h-14 w-auto object-contain shrink-0" />
                        <span className="text-xl md:text-2xl text-white font-adumu tracking-wide">Grow<span className="text-gradient">Up</span></span>
                    </a>

                    {/* Menu */}
                    <div className="hidden lg:flex space-x-8 items-center font-medium text-sm font-poppins">
                        <a href="#o-projekcie" className="text-gray-300 hover:text-[#bca4e6] transition-colors">O projekcie</a>
                        <a href="#sciezki" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Ścieżki</a>
                        <a href="#etapy" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Etapy</a>
                        <a href="#nagrody" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Korzyści</a>
                        <a href="#organizator" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Organizatorzy</a>
                        <a href="#kontakt" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Kontakt</a>
                    </div>
                </nav>
            </header>
        );
    };

    // --- 2. HERO ---
    const HeroSection = () => (
        <section className="min-h-screen flex items-center justify-center text-center px-4 pt-32 md:pt-36 hero-gradient relative overflow-hidden font-poppins">

            {/* Background Decorations */}
            <div className="hero-beam-left"></div>
            <div className="hero-beam-right"></div>
            <div className="absolute top-[16%] left-[10%] w-56 h-56 border border-[#b779ff]/20 rounded-full"></div>
            <div className="absolute bottom-[14%] right-[-4%] w-72 h-72 bg-[#84cc16]/18 rounded-full blur-[120px]"></div>
            <div className="absolute top-[12%] right-[12%] w-80 h-80 border border-[#22c55e]/20 rounded-full"></div>

            <div className="max-w-5xl z-10 hero-panel poster-outline rounded-[32px] px-6 md:px-12 py-10 md:py-14">
                <div className="inline-flex items-center gap-3 px-5 py-2 rounded-full bg-white/5 border border-white/10 mb-8">
                    <span className="accent-dot"></span>
                    <span className="text-xs font-bold uppercase tracking-[0.28em] text-slate-200">Hackathon 2026</span>
                </div>

                <h1 className="text-5xl md:text-7xl lg:text-[7rem] font-normal text-white leading-[0.94] mb-5 tracking-tight font-adumu uppercase">
                    Grow<span className="text-gradient">Up</span>
                </h1>

                <h2 className="text-2xl md:text-4xl lg:text-5xl font-black uppercase mb-8 tracking-tight">
                    <span className="text-violet-400">Hackuj dorosłość,</span>{' '}
                    <span className="text-lime-400">wymyśl lepsze jutro</span>
                </h2>

                <p className="text-lg md:text-xl text-slate-300 max-w-3xl mx-auto mb-10 leading-relaxed">
                    Ogólnopolski hackathon dla młodych ludzi, który łączy technologię, innowacje i empatię, aby ułatwić wchodzenie w dorosłe życie.
                    <br className="hidden md:block" />
                    <br /><br />
                    Pracuj w zespole, testuj pomysły, prototypuj, korzystaj z wiedzy mentorów i stwórz rozwiązanie, które może zmienić czyjeś (i Twoje) życie.
                </p>

                <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
                    <a href={GOOGLE_FORM_LINK} target="_blank" className="btn-gradient text-[#081120] text-lg font-extrabold py-4 px-10 rounded-full flex items-center justify-center gap-2 uppercase tracking-[0.08em]">
                        Chcę wziąć udział <i className="ph-bold ph-arrow-right"></i>
                    </a>
                </div>
            </div>
        </section>
    );

    // --- 3. O PROJEKCIE ---
    const AboutSection = () => (
        <section id="o-projekcie" className="py-24 px-4 section-glow relative">
            <div className="container mx-auto max-w-6xl section-shell rounded-[32px] px-6 md:px-10 py-12 md:py-16">
                <div className="max-w-4xl mx-auto">
                    <div>
                            <h2 className="section-title text-3xl md:text-5xl font-bold mb-8 leading-tight text-center">
                                Bo wejście w dorosłość stało się <span className="text-gradient">wyzwaniem</span>, którego nikt nas nie uczy.
                            </h2>

                            <div className="space-y-6 text-gray-300 text-lg leading-relaxed">
                                <p>
                                    Młodzi ludzie wchodzą dziś w samodzielne życie w świecie pełnym presji — cyfrowej, społecznej, klimatycznej i emocjonalnej. Codziennie mierzą się ze stresem, niepewnością, porównywaniem się, samotnością i informacyjnym przeciążeniem.
                                </p>
                                <p>
                                    Technologia, która miała ułatwiać życie, często je komplikuje. A jednocześnie szkoła nie daje narzędzi do radzenia sobie z planowaniem dorosłego życia, zarządzaniem  finansami, nawiązywaniem i utrzymywaniem relacji czy zdrowiem psychicznym.
                                </p>
                                <p className="font-semibold text-white border-l-4 border-[#71135f] pl-4">
                                    W tym chaosie młodzi wciąż chcą jednego: robić rzeczy, które mają sens, budować swoją przyszłość i tworzyć rozwiązania, które realnie pomagają.
                                </p>
                                <p>
                                    GrowUp powstał właśnie po to — żeby dać przestrzeń, w której młodzi mogą odzyskiwać wpływ, sprawczość i pewność siebie.
                                </p>
                            </div>
                    </div>
                </div>
            </div>
        </section>
    );

    // --- 3.5. ŚCIEŻKI TEMATYCZNE ---
    const PathsSection = () => {
        const paths = [
            {
                title: "Grow Self",
                desc: `Jak dorosnąć w XXI wieku i nie zwariować?

W dobie niestabilności geopolitycznej, kryzysu klimatycznego i wszechobecnej presji sukcesu, odnalezienie własnej drogi staje się wyzwaniem ekstremalnym. Tradycyjne metody wsparcia często nie nadążają za tempem zmian. Twoim zadaniem jest zaprojektowanie rozwiązania, które pomoże naszym rówieśnikom zadbać o zdrowie psychiczne, wypracować autentyczną równowagę (work-life-tech balance) i głębiej poznać siebie.

„Nie ma ucieczki przed formą, jak tylko w inną formę” – pisał Witold Gombrowicz. Skoro nie uciekniemy od technologii i współczesnych struktur, stwórzmy ich nową, lepszą formę: taką, która wspiera człowieka, zamiast go przytłaczać.`,
                icon: "ph-user"
            },
            {
                title: "Grow Together",
                desc: `Jak nie być samotnym w tłumie?

Ludzie to zwierzęta stadne, lecz w świecie algorytmów coraz częściej o tym zapominamy. Budowanie i utrzymywanie wartościowych relacji staje się trudniejsze niż kiedykolwiek, a ekrany, które miały nas łączyć, paradoksalnie wznoszą między nami bariery. Samotność stała się chorobą cywilizacyjną, dotykającą nas bez względu na liczbę "znajomych" w sieci.

„Ludzie mają zbyt mało czasu, aby cokolwiek poznać. Kupują w sklepach rzeczy gotowe. A ponieważ nie ma magazynów z przyjaciółmi, więc ludzie nie mają przyjaciół” – pisał Antoine de Saint-Exupéry. W świecie nastawionym na szybką konsumpcję relacji, zapomnieliśmy o procesie ich uważnego budowania.`,
                icon: "ph-users-three"
            },
            {
                title: "Grow Skills",
                desc: `Jak uczyć się jutra, które dzieje się dziś?

System edukacji często przypomina mapę do świata, który już nie istnieje. W obliczu rewolucji AI i błyskawicznej dezaktualizacji wiedzy, kluczową kompetencją nie jest już "wiedzieć", ale "potrafić się uczyć" i krytycznie analizować rzeczywistość. Musimy wyposażyć się w narzędzia, które pozwolą nam nawigować po rynku pracy, który zmienia się na naszych oczach.

„Wiedza to jedyna rzecz, która się mnoży, gdy się ją dzieli” – pisał Andrzej Majewski. W erze sztucznej inteligencji to współdzielenie wiedzy i umiejętność współpracy z technologią, a nie walka z nią, stanie się naszym największym atutem.`,
                icon: "ph-brain"
            },
            {
                title: "Grow Impact",
                desc: `Jak zostawić świat lepszym, niż go zastaliśmy?

Technologia rośnie szybciej niż nasza refleksja nad jej skutkami. Stoimy przed wyzwaniami, które nie uznają granic: od kryzysu klimatycznego po dylematy etyczne związane z automatyzacją życia. Mamy potężne narzędzia, ale musimy nadać im kierunek, który służy wspólnemu dobru, a nie tylko chwilowemu zyskowi.

„Bądź zmianą, którą chcesz ujrzeć w świecie” – te słowa Mahatmy Gandhiego nabierają nowego znaczenia w erze cyfrowej. Nasza sprawczość jako obywateli i twórców technologii jest większa niż kiedykolwiek – pytanie brzmi, jak ją wykorzystamy.`,
                icon: "ph-globe-hemisphere-west"
            },
            {
                title: "Grow Everyday",
                desc: `Jak ogarnąć dorosłość i nie stracić sensu?

Dorosłość często kojarzy się z wielkimi decyzjami i spektakularnymi sukcesami. Tymczasem większość naszego życia składa się z dużo prostszych rzeczy: zapłacenia rachunków, umówienia wizyty u lekarza, zorganizowania budżetu czy znalezienia czasu na odpoczynek. To właśnie w tej codzienności uczymy się samodzielności. Małe zadania potrafią być zaskakująco trudne - szczególnie gdy nikt wcześniej nie pokazał nam, jak je ogarnąć.

"Wszyscy powinniśmy przynajmniej raz w życiu dostać owację na stojąco, bo przecież każdy z nas zwycięża ten świat." - R. J. Palacio, "Cudowny chłopak"

W tej ścieżce szukamy pomysłów, które pomagają ludziom lepiej radzić sobie z codziennością: upraszczają organizację życia, pomagają zarządzać finansami czy budować dobre nawyki. Bo czasem największą innowacją nie jest zmiana świata - tylko sprawienie, że zwykłe życie staje się trochę łatwiejsze.`,
                icon: "ph-calendar-check"
            },
        ];

        return (
            <section id="sciezki" className="py-24 px-4 relative overflow-hidden">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(157,78,221,0.18),transparent_45%),radial-gradient(circle_at_80%_75%,rgba(132,204,22,0.14),transparent_40%)] pointer-events-none"></div>
                <div className="container mx-auto max-w-6xl relative z-10">
                    <div className="text-center mb-16">
                        <h2 className="section-title text-4xl md:text-5xl font-bold mb-4">Ścieżki <span className="text-gradient">Tematyczne</span></h2>
                        <p className="text-slate-300">Wybierz obszar, w którym chcesz działać i wprowadzaj realne zmiany.</p>
                    </div>

                    <div className="space-y-8">
                        {paths.map((path, i) => {
                            const paragraphs = path.desc.split('\n\n').filter(Boolean);

                            return (
                                <article key={i} className="puzzle-block rounded-3xl overflow-hidden border border-white/10 hover:border-[#71135f]/60 transition-all duration-300">
                                    <div className="lg:grid lg:grid-cols-[220px_1fr]">
                                        <div className="bg-[#071124]/78 px-6 py-8 border-b lg:border-b-0 lg:border-r border-white/10">
                                            <div className="w-14 h-14 bg-[#84cc16]/10 border border-[#84cc16]/30 rounded-xl flex items-center justify-center mb-5 text-[#d8ff72]">
                                                <i className={`ph-duotone ${path.icon} text-3xl`}></i>
                                            </div>
                                            <h3 className="text-2xl font-bold text-white leading-tight">{path.title}</h3>
                                        </div>

                                        <div className="px-6 md:px-8 py-8 space-y-5">
                                            {paragraphs.map((paragraph, pIdx) => {
                                                const trimmed = paragraph.trim();
                                                const isOpenQuestion = pIdx === 0 && trimmed.endsWith('?');
                                                const isQuote = trimmed.startsWith('„') || trimmed.startsWith('"');
                                                const isChallengeLabel = trimmed === 'Główne wyzwanie:';
                                                const isAfterChallengeLabel = pIdx > 0 && paragraphs[pIdx - 1].trim() === 'Główne wyzwanie:';

                                                if (isOpenQuestion) {
                                                    return (
                                                        <p key={pIdx} className="text-xl md:text-2xl font-bold text-white leading-snug tracking-tight">
                                                            {paragraph}
                                                        </p>
                                                    );
                                                }

                                                if (isQuote) {
                                                    return (
                                                        <p key={pIdx} className="text-gray-200 italic font-serif text-[1.02rem] leading-relaxed border-l-4 border-[#bca4e6] pl-4 md:pl-5 bg-white/[0.03] rounded-r-lg py-3 whitespace-pre-line">
                                                            {paragraph}
                                                        </p>
                                                    );
                                                }

                                                if (isChallengeLabel) {
                                                    return (
                                                        <p key={pIdx} className="text-sm uppercase tracking-[0.18em] text-[#d8ff72] font-semibold pt-2">
                                                            {paragraph}
                                                        </p>
                                                    );
                                                }

                                                if (isAfterChallengeLabel) {
                                                    return (
