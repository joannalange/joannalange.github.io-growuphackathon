<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GrowUp Hackathon</title>
    <link rel="icon" type="image/png" href="logo.png" /> 
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            start: '#71135f', 
                            end: '#4532ce',   
                            dark: '#05020a',  
                            card: '#150b24',  
                            border: '#71135f' 
                        }
                    },
                    fontFamily: {
                        'adumu': ['Adumu', 'Poppins', 'sans-serif'], 
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* --- FONTS & BASICS --- */
        @font-face {
            font-family: 'Adumu';
            src: url('Adumu-Regular.otf') format('opentype'),
                 url('Adumu-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #05020a;
            color: #f3f4f6;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #0a0510; }
        ::-webkit-scrollbar-thumb { background: #71135f; border-radius: 5px; }

        /* Effects */
        .hero-gradient {
            background: 
                radial-gradient(circle at 15% 25%, rgba(113, 19, 95, 0.25), transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(69, 50, 206, 0.25), transparent 50%);
        }

        .text-gradient {
            background: linear-gradient(90deg, #71135f 0%, #4532ce 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #71135f 0%, #4532ce 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 25px rgba(113, 19, 95, 0.6);
            transform: translateY(-2px);
        }

        .section-glow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            height: 60%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(69, 50, 206, 0.08), transparent 70%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        /* Timeline Line */
        .timeline-line {
            position: absolute;
            left: 50%;
            top: 20px;
            bottom: 20px;
            width: 2px;
            background: linear-gradient(to bottom, #71135f, #4532ce, #71135f);
            transform: translateX(-50%);
        }
        @media (max-width: 768px) {
            .timeline-line { left: 24px; transform: translateX(0); }
        }

        /* Puzzle/Block Style */
        .puzzle-block {
            border: 1px solid rgba(255,255,255,0.05);
            background: linear-gradient(145deg, rgba(21,11,36,0.8), rgba(10,5,16,0.9));
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .puzzle-block:hover {
            border-color: #71135f;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -5px rgba(113, 19, 95, 0.2);
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

    // --- LINK DO FORMULARZA (Placeholder) ---
    const GOOGLE_FORM_LINK = "https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform"; 

    // --- 1. HEADER (BEZ BUTTONA) ---
    const Header = () => {
        const [isScrolled, setIsScrolled] = React.useState(false);

        React.useEffect(() => {
            const handleScroll = () => setIsScrolled(window.scrollY > 50);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        return (
            <header className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'bg-[#0a0510]/95 backdrop-blur-md border-b border-white/10 py-3' : 'bg-transparent py-6'}`}>
                <nav className="container mx-auto px-6 flex justify-between items-center">
                    
                    {/* Logo */}
                    <a href="#" className="text-2xl md:text-3xl text-white flex items-center gap-2 font-adumu tracking-wide hover:opacity-90">
                        <i className="ph-fill ph-plant text-[#71135f] text-3xl"></i>
                        Grow<span className="text-gradient">Up</span>
                    </a>

                    {/* Menu - BEZ BUTTONA */}
                    <div className="hidden lg:flex space-x-8 items-center font-medium text-sm font-poppins">
                        <a href="#o-projekcie" className="text-gray-300 hover:text-[#bca4e6] transition-colors">O projekcie</a>
                        <a href="#etapy" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Etapy</a>
                        <a href="#nagrody" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Korzyści</a>
                        <a href="#organizator" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Organizatorzy</a>
                        <a href="#kontakt" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Kontakt</a>
                    </div>
                </nav>
            </header>
        );
    };

    // --- 2. HERO (TEKSTY + BUTTON) ---
    const HeroSection = () => (
        <section className="min-h-screen flex items-center justify-center text-center px-4 pt-20 hero-gradient relative overflow-hidden font-poppins">
            
            {/* Background Decorations */}
            <div className="absolute top-1/4 left-10 w-64 h-64 bg-[#71135f]/10 rounded-full blur-[100px] animate-pulse"></div>
            <div className="absolute bottom-1/4 right-10 w-64 h-64 bg-[#4532ce]/10 rounded-full blur-[100px] animate-pulse delay-1000"></div>

            <div className="max-w-4xl z-10">
                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 mb-8 animate-bounce">
                    <span className="w-2 h-2 bg-gradient-to-r from-[#71135f] to-[#4532ce] rounded-full"></span>
                    <span className="text-xs font-bold uppercase tracking-wider text-gray-300">Hackathon</span>
                </div>
                
                <h1 className="text-5xl md:text-7xl lg:text-8xl font-normal text-white leading-tight mb-4 tracking-tight font-adumu">
                    Grow<span className="text-gradient">Up</span> Hackathon
                </h1>
                
                <h2 className="text-xl md:text-3xl font-bold text-white mb-8">
                    Hackuj dorosłość, wymyśl lepsze jutro.
                </h2>

                <p className="text-lg md:text-xl text-gray-300 max-w-3xl mx-auto mb-10 leading-relaxed">
                    Ogólnopolski hackathon dla młodych ludzi, który łączy technologię, innowacje i empatię, aby ułatwić wchodzenie w dorosłe życie.
                    <br className="hidden md:block" />
                    Pracuj w zespole, testuj pomysły, prototypuj, korzystaj z wiedzy mentorów i stwórz rozwiązanie, które może zmienić czyjeś (i Twoje) życie.
                </p>
                
                <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
                    <a href={GOOGLE_FORM_LINK} target="_blank" className="btn-gradient text-white text-lg font-bold py-4 px-10 rounded-full shadow-[0_0_20px_rgba(113,19,95,0.4)] flex items-center justify-center gap-2">
                        Chcę wziąć udział <i className="ph-bold ph-arrow-right"></i>
                    </a>
                </div>
            </div>
        </section>
    );

    // --- 3. O PROJEKCIE (KLOCKI + TEKST) ---
    const AboutSection = () => (
        <section id="o-projekcie" className="py-24 px-4 section-glow bg-[#0a0510] relative">
            <div className="container mx-auto max-w-6xl">
                
                <div className="grid lg:grid-cols-2 gap-16 items-center">
                    <div>
                        <h2 className="text-3xl md:text-5xl font-bold mb-8 leading-tight">
                            Bo wejście w dorosłość stało się <span className="text-gradient">wyzwaniem</span>, którego nikt nas nie uczy.
                        </h2>
                        
                        <div className="space-y-6 text-gray-300 text-lg leading-relaxed">
                            <p>
                                Młodzi ludzie wchodzą dziś w samodzielne życie w świecie pełnym presji — cyfrowej, społecznej, klimatycznej i emocjonalnej. Codziennie mierzą się ze stresem, niepewnością, porównywaniem się, samotnością i informacyjnym przeciążeniem.
                            </p>
                            <p>
                                Technologia, która miała ułatwiać życie, często je komplikuje. A jednocześnie szkoła nie daje narzędzi do radzenia sobie z finansami, relacjami, zdrowiem psychicznym czy planowaniem dorosłego życia.
                            </p>
                            <p className="font-semibold text-white border-l-4 border-[#71135f] pl-4">
                                W tym chaosie młodzi wciąż chcą jednego: robić rzeczy, które mają sens, budować swoją przyszłość i tworzyć rozwiązania, które realnie pomagają.
                            </p>
                            <p>
                                GrowUp powstał właśnie po to — żeby dać przestrzeń, w której młodzi mogą odzyskiwać wpływ, sprawczość i pewność siebie.
                            </p>
                        </div>
                    </div>
                    
                    {/* WIZUALIZACJA: KLOCKI / PROJEKT */}
                    <div className="relative mt-12 lg:mt-0">
                        <div className="absolute inset-0 bg-gradient-to-tr from-[#71135f] to-[#4532ce] opacity-10 rounded-full blur-3xl"></div>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 relative z-10">
                            {/* Klocek 1 */}
                            <div className="puzzle-block p-6 rounded-2xl flex flex-col items-center text-center transform sm:translate-y-8">
                                <div className="w-12 h-12 bg-[#71135f]/20 rounded-full flex items-center justify-center mb-4 text-[#d946ef]">
                                    <i className="ph-duotone ph-rocket-launch text-2xl"></i>
                                </div>
                                <span className="text-white font-semibold">Rozwijać kompetencje</span>
                                <p className="text-xs text-gray-400 mt-2">Praktyczne umiejętności dorosłości</p>
                            </div>

                            {/* Klocek 2 */}
                            <div className="puzzle-block p-6 rounded-2xl flex flex-col items-center text-center">
                                <div className="w-12 h-12 bg-[#4532ce]/20 rounded-full flex items-center justify-center mb-4 text-[#818cf8]">
                                    <i className="ph-duotone ph-circuitry text-2xl"></i>
                                </div>
                                <span className="text-white font-semibold">Projektować technologie</span>
                                <p className="text-xs text-gray-400 mt-2">Które wspierają, nie obciążają</p>
                            </div>

                            {/* Klocek 3 */}
                            <div className="puzzle-block p-6 rounded-2xl flex flex-col items-center text-center transform sm:translate-y-8">
                                <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center mb-4 text-white">
                                    <i className="ph-duotone ph-users-three text-2xl"></i>
                                </div>
                                <span className="text-white font-semibold">Działać w zespole</span>
                                <p className="text-xs text-gray-400 mt-2">Uczyć się od mentorów</p>
                            </div>

                            {/* Klocek 4 */}
                            <div className="puzzle-block p-6 rounded-2xl flex flex-col items-center text-center">
                                <div className="w-12 h-12 bg-orange-500/20 rounded-full flex items-center justify-center mb-4 text-orange-400">
                                    <i className="ph-duotone ph-crown text-2xl"></i>
                                </div>
                                <span className="text-white font-semibold">Odzyskiwać wpływ</span>
                                <p className="text-xs text-gray-400 mt-2">Sprawczość i pewność siebie</p>
                            </div>
                        </div>

                        <div className="mt-16 text-center">
                            <h3 className="text-xl md:text-2xl font-bold text-white max-w-md mx-auto leading-relaxed">
                                "GrowUp to przestrzeń gdzie dorosłość staje się <span className="text-[#bca4e6] underline decoration-[#71135f]">projektem</span>."
                            </h3>
                            <p className="text-sm text-gray-500 mt-2">— który można wspólnie zaplanować, stworzyć i zrealizować.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    );

    // --- 4. ETAPY (PIONOWY WYKRES) ---
    const StagesSection = () => {
        const stages = [
            { title: "Start naboru zgłoszeń", date: "Marzec", icon: "ph-megaphone" },
            { title: "Formowanie zespołów", date: "Koniec Marca", icon: "ph-users-four" },
            { title: "Inauguracja Programu - spotkanie kick-off", date: "Kwiecień", icon: "ph-flag-checkered" },
            { title: "Miesiąc Wiedzy i Eksperymentów", date: "Kwiecień / Maj", icon: "ph-flask" },
            { title: "Praca nad rozwiązaniem", date: "Maj", icon: "ph-laptop" },
            { title: "Wielki Finał", date: "Czerwiec", icon: "ph-trophy" },
        ];

        return (
            <section id="etapy" className="py-24 px-4 bg-[#05020a]">
                <div className="container mx-auto max-w-4xl">
                    <div className="text-center mb-20">
                        <h2 className="text-4xl md:text-5xl font-bold mb-4">Etapy <span className="text-gradient">Programu</span></h2>
                        <p className="text-gray-400">Twoja droga od pomysłu do realizacji</p>
                    </div>

                    <div className="relative py-4">
                        {/* Linia pionowa */}
                        <div className="timeline-line hidden md:block"></div>
                        <div className="timeline-line md:hidden left-8"></div> 

                        <div className="flex flex-col gap-12">
                            {stages.map((stage, idx) => (
                                <div key={idx} className={`flex items-center gap-8 ${idx % 2 === 0 ? 'md:flex-row' : 'md:flex-row-reverse'} flex-row`}>
                                    
                                    {/* Desktop Left Side */}
                                    <div className="flex-1 hidden md:block text-right">
                                        {idx % 2 === 0 && (
                                            <>
                                                <h3 className="text-xl font-bold text-white">{stage.title}</h3>
                                                <div className="text-[#bca4e6] font-medium mt-1 inline-block px-3 py-1 rounded-full bg-[#150b24] border border-[#71135f]/30">{stage.date}</div>
                                            </>
                                        )}
                                    </div>

                                    {/* Center Icon */}
                                    <div className="relative z-10 w-16 h-16 rounded-full bg-[#150b24] border-2 border-[#71135f] flex items-center justify-center shrink-0 shadow-[0_0_20px_rgba(113,19,95,0.4)]">
                                        <i className={`ph-fill ${stage.icon} text-2xl text-white`}></i>
                                    </div>

                                    {/* Desktop Right Side + Mobile */}
                                    <div className="flex-1">
                                         {/* Mobile Text */}
                                        <div className="md:hidden">
                                            <h3 className="text-lg font-bold text-white">{stage.title}</h3>
                                            <span className="text-[#bca4e6] font-medium text-sm">{stage.date}</span>
                                        </div>

                                        {/* Desktop Text Right */}
                                        <div className="hidden md:block text-left">
                                            {idx % 2 !== 0 && (
                                                <>
                                                    <h3 className="text-xl font-bold text-white">{stage.title}</h3>
                                                    <div className="text-[#bca4e6] font-medium mt-1 inline-block px-3 py-1 rounded-full bg-[#150b24] border border-[#71135f]/30">{stage.date}</div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </section>
        );
    };

    // --- 5. KORZYŚCI I NAGRODY ---
    const BenefitsSection = () => (
        <section id="nagrody" className="py-24 px-4 bg-brand-dark relative overflow-hidden">
             <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5 pointer-events-none"></div>
            <div className="container mx-auto max-w-6xl relative z-10">
                
                {/* 5A. CO ZYSKASZ (Kafelki) */}
                <div className="mb-24">
                    <h2 className="text-4xl md:text-5xl font-bold mb-12 text-center">Biorąc udział w GrowUp, <span className="text-gradient">zdobywasz:</span></h2>
                    
                    <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {[
                            "Praktyczne kompetencje (technologia, współpraca, komunikacja, organizacja)",
                            "Wsparcie mentorów — technologicznych, społecznych i biznesowych",
                            "Doświadczenie projektowe, które wykorzystasz na studiach i w pracy",
                            "Portfolio zrealizowanego projektu (robi wrażenie na rekruterach)",
                            "Możliwość przetestowania pomysłu w realnym środowisku",
                            "Kontakty i nowe znajomości z ludźmi, którzy myślą i czują podobnie",
                            "Dołączenie do społeczności GrowUp Alumni",
                            "Certyfikat udziału potwierdzający umiejętności"
                        ].map((text, i) => (
                            <div key={i} className="puzzle-block p-6 rounded-xl flex flex-col h-full hover:bg-[#1d1130]">
                                <i className="ph-fill ph-check-circle text-3xl text-[#71135f] mb-4"></i>
                                <p className="text-gray-300 text-sm font-medium leading-relaxed">{text}</p>
                            </div>
                        ))}
                    </div>
                </div>

                {/* 5B. NAGRODY (Box) */}
                <div className="bg-gradient-to-br from-[#150b24] to-[#0f0518] rounded-3xl p-8 md:p-12 border border-[#71135f]/40 relative overflow-hidden shadow-2xl">
                    <div className="absolute top-0 right-0 w-80 h-80 bg-[#4532ce]/10 rounded-full blur-3xl pointer-events-none"></div>
                    
                    <div className="grid md:grid-cols-2 gap-12 items-center relative z-10">
                        <div>
                            <h3 className="text-3xl font-bold text-white mb-6">A na zwycięzców czekają <br/>dodatkowe nagrody:</h3>
                            <a href={GOOGLE_FORM_LINK} target="_blank" className="inline-flex items-center gap-2 text-[#bca4e6] hover:text-white font-semibold transition-colors border-b border-[#bca4e6] pb-1">
                                Dołącz do gry o przyszłość <i className="ph-bold ph-arrow-right"></i>
                            </a>
                        </div>

                        <div className="space-y-4">
                            <div className="flex items-start gap-4 bg-white/5 p-4 rounded-xl border border-white/5">
                                <div className="mt-1 w-10 h-10 rounded-full bg-[#71135f]/20 flex items-center justify-center text-[#d946ef] shrink-0">
                                    <i className="ph-bold ph-wallet text-xl"></i>
                                </div>
                                <div>
                                    <h4 className="font-bold text-white text-lg">Microgranty</h4>
                                    <p className="text-sm text-gray-400">Dla zespołów z I, II i III miejsca.</p>
                                </div>
                            </div>
                            <div className="flex items-start gap-4 bg-white/5 p-4 rounded-xl border border-white/5">
                                <div className="mt-1 w-10 h-10 rounded-full bg-[#4532ce]/20 flex items-center justify-center text-[#818cf8] shrink-0">
                                    <i className="ph-bold ph-stairs text-xl"></i>
                                </div>
                                <div>
                                    <h4 className="font-bold text-white text-lg">Program rozwojowy</h4>
                                    <p className="text-sm text-gray-400">Wsparcie specjalistów w dopracowaniu i testowaniu projektu.</p>
                                </div>
                            </div>
                            <div className="flex items-start gap-4 bg-white/5 p-4 rounded-xl border border-white/5">
                                <div className="mt-1 w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white shrink-0">
                                    <i className="ph-bold ph-briefcase text-xl"></i>
                                </div>
                                <div>
                                    <h4 className="font-bold text-white text-lg">Staże i Networking</h4>
                                    <p className="text-sm text-gray-400">Możliwość stażu, sesje „job shadowing” i kontakty otwierające drzwi.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    );

    // --- 6. ORGANIZATORZY (FUNDACJA + ZESPÓŁ) ---
    const OrganizersSection = () => (
        <section id="organizator" className="py-24 px-4 bg-[#0a0510]">
            <div className="container mx-auto max-w-5xl">
                
                {/* A. FUNDACJA */}
                <div className="mb-24">
                    <h2 className="text-4xl md:text-5xl font-bold mb-12 border-b border-white/10 pb-6">ORGANIZATORZY</h2>
                    <div className="grid md:grid-cols-[1fr_2fr] gap-12">
                        <div>
                            <h3 className="text-2xl font-bold text-white mb-2">Fundacja <br/><span className="text-[#bca4e6]">DeepKind</span></h3>
                            <div className="w-12 h-1 bg-[#71135f] mt-4 rounded-full"></div>
                        </div>
                        <div className="text-gray-300 space-y-5 text-lg leading-relaxed">
                            <p>
                                Fundacja DeepKind wspiera osoby i społeczności, które chcą działać odpowiedzialnie i w zgodzie z wartościami. 
                                Tworzy inicjatywy rozwijające kompetencje, ułatwiające dostęp do wiedzy oraz pokazujące, jak technologia, 
                                edukacja i empatia mogą realnie wzmacniać ludzi i środowisko.
                            </p>
                            <p>
                                Pomaga organizacjom i partnerom wdrażać rozwiązania społeczne i ekologiczne, dzięki czemu mogą skuteczniej wspierać zrównoważony rozwój, różnorodność i dobrostan.
                            </p>
                            <p className="text-base text-gray-500 italic border-l-2 border-gray-700 pl-4">
                                Działa w obszarach: edukacji klimatycznej, odpowiedzialnych technologii, neuroróżnorodności, wsparcia kobiet, kultury empatii oraz innowacji społecznych — łącząc je w praktyczne programy i partnerskie projekty.
                            </p>
                        </div>
                    </div>
                </div>

                {/* B. ZESPÓŁ PROGRAMOWY */}
                <div>
                    <h2 className="text-4xl md:text-5xl font-bold mb-12 border-b border-white/10 pb-6">ZESPÓŁ PROGRAMOWY</h2>
                    <div className="grid md:grid-cols-[1fr_2fr] gap-12">
