<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GrowUp Hackathon</title>
    <link rel="icon" type="image/png" href="logo.png" /> 
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            start: '#71135f', 
                            end: '#4532ce',   
                            dark: '#05020a',  
                            card: '#150b24',  
                            border: '#71135f' 
                        }
                    },
                    fontFamily: {
                        'adumu': ['Adumu', 'Poppins', 'sans-serif'], 
                        'poppins': ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* --- FONTS & BASICS --- */
        @font-face {
            font-family: 'Adumu';
            src: url('Adumu-Regular.otf') format('opentype'),
                 url('Adumu-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #05020a;
            color: #f3f4f6;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #0a0510; }
        ::-webkit-scrollbar-thumb { background: #71135f; border-radius: 5px; }

        /* Effects */
        .hero-gradient {
            background: 
                radial-gradient(circle at 15% 25%, rgba(113, 19, 95, 0.25), transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(69, 50, 206, 0.25), transparent 50%);
        }

        .text-gradient {
            background: linear-gradient(90deg, #71135f 0%, #4532ce 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #71135f 0%, #4532ce 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 25px rgba(113, 19, 95, 0.6);
            transform: translateY(-2px);
        }

        .section-glow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            height: 60%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(69, 50, 206, 0.08), transparent 70%);
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        /* Timeline Line */
        .timeline-line {
            position: absolute;
            left: 50%;
            top: 20px;
            bottom: 20px;
            width: 2px;
            background: linear-gradient(to bottom, #71135f, #4532ce, #71135f);
            transform: translateX(-50%);
        }
        @media (max-width: 768px) {
            .timeline-line { left: 24px; transform: translateX(0); }
        }

        /* Puzzle/Block Style */
        .puzzle-block {
            border: 1px solid rgba(255,255,255,0.05);
            background: linear-gradient(145deg, rgba(21,11,36,0.8), rgba(10,5,16,0.9));
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .puzzle-block:hover {
            border-color: #71135f;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -5px rgba(113, 19, 95, 0.2);
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

    // --- LINKI GLOBALNE ---
    const GOOGLE_FORM_LINK = "zophia.hardek@gmail.com TUTAJ WKLEJ LINK"; 
    const REGULAMIN_LINK = "asia.lilolu@gmail.com TUTAJ WKLEJ LINK";
    const FB_LINK = "#"; // TUTAJ WKLEJ LINK DO FB
    const INSTA_LINK = "#"; // TUTAJ WKLEJ LINK DO INSTA

    // --- 1. HEADER ---
    const Header = () => {
        const [isScrolled, setIsScrolled] = React.useState(false);

        React.useEffect(() => {
            const handleScroll = () => setIsScrolled(window.scrollY > 50);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        return (
            <header className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'bg-[#0a0510]/95 backdrop-blur-md border-b border-white/10 py-3' : 'bg-transparent py-6'}`}>
                <nav className="container mx-auto px-6 flex justify-between items-center">
                    
                    {/* Logo */}
                    <a href="#" className="flex items-center gap-3 hover:opacity-90">
                        <img src="logo.png" alt="GrowUp Logo" className="h-10 md:h-12" />
                        <span className="text-2xl md:text-3xl text-white font-adumu tracking-wide">Grow<span className="text-gradient">Up</span></span>
                    </a>

                    {/* Menu */}
                    <div className="hidden lg:flex space-x-8 items-center font-medium text-sm font-poppins">
                        <a href="#o-projekcie" className="text-gray-300 hover:text-[#bca4e6] transition-colors">O projekcie</a>
                        <a href="#sciezki" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Ścieżki</a>
                        <a href="#etapy" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Etapy</a>
                        <a href="#nagrody" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Korzyści</a>
                        <a href="#organizator" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Organizatorzy</a>
                        <a href="#kontakt" className="text-gray-300 hover:text-[#bca4e6] transition-colors">Kontakt</a>
                    </div>
                </nav>
            </header>
        );
    };

    // --- 2. HERO ---
    const HeroSection = () => (
        <section className="min-h-screen flex items-center justify-center text-center px-4 pt-20 hero-gradient relative overflow-hidden font-poppins">

            <div className="absolute bottom-1/4 right-10 w-64 h-64 bg-[#4532ce]/10 rounded-full blur-[100px] animate-pulse delay-1000"></div>

                <h2 className="text-xl md:text-3xl font-bold text-white mb-8">

                </h2>

                <p className="text-lg md:text-xl text-gray-300 max-w-3xl mx-auto mb-10 leading-relaxed">

                </div>

    );

    // --- 3. O PROJEKCIE ---
    const AboutSection = () => (
        <section id="o-projekcie" className="py-24 px-4 section-glow bg-[#0a0510] relative">
            <div className="container mx-auto max-w-6xl">
                <div className="grid lg:grid-cols-2 gap-16 items-center">
                    <div className="max-w-4xl mx-auto items-center">
                        <div>
                            <h2 className="text-3xl md:text-5xl font-bold mb-8 leading-tight">

                            </h2>

                                </p>
                                <p>
                                    Technologia, która miała ułatwiać życie, często je komplikuje. A jednocześnie szkoła nie daje narzędzi do radzenia sobie z planowaniem dorosłego życia, zarządzaniem finansami, nawiązywaniem i utrzymywaniem relacji czy zdrowiem psychicznym.
                                </p>
                                <p className="font-semibold text-white border-l-4 border-[#71135f] pl-4">

                                </p>
                                <p>

                                </p>

    );

    // --- 3.5. ŚCIEŻKI TEMATYCZNE ---
    const PathsSection = () => {

            { title: "Grow Together", desc: "[zophia.hardek@gmail.com WKLEJ TU OPIS ŚCIEŻKI]", icon: "ph-users-three" },
            { title: "Grow Skills", desc: "[zophia.hardek@gmail.com WKLEJ TU OPIS ŚCIEŻKI]", icon: "ph-brain" },

    const StagesSection = () => {
        const stages = [

                            <div className="flex items-start gap-4 bg-white/5 p-4 rounded-xl border border-white/5">

    // --- 6. ORGANIZATORZY ---
    const OrganizersSection = () => (

            <div className="container mx-auto max-w-5xl">
                
                <div className="mb-24">
                    <h2 className="text-4xl md:text-5xl font-bold mb-12 border-b border-white/10 pb-6">ORGANIZATORZY</h2>
